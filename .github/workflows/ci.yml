name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      - name: Install API deps
        # api/.npmrc sets production=true (lean prod deploys); tests need
        # devDependencies (better-sqlite3), so include them explicitly here.
        run: npm ci --include=dev
        working-directory: api
      - name: Run tests
        run: node --test
        working-directory: api
        env:
          JWT_SECRET: test-secret-for-ci

  frontend:
    name: Frontend lint + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install deps (including devDependencies)
        # devDependencies (vite, eslint, vitest) are needed to lint, test, and
        # build, so install with --include=dev.
        run: npm ci --include=dev
      - name: Lint (eslint src)
        run: npm run lint
      - name: Frontend tests (Vitest)
        run: npm run test:fe
      - name: Vite build
        run: npx vite build
