# Dependabot keeps the frontend (root) and Express API (/api) npm dependencies
# plus the GitHub Actions used in CI up to date. Weekly cadence with modest PR
# limits to avoid noise.
version: 2
updates:
  # Frontend (Vite + React) — root package.json
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"

  # Express API — api/package.json
  - package-ecosystem: "npm"
    directory: "/api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "api"

  # GitHub Actions used by the CI workflow
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
