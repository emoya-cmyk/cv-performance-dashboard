services:
  - type: web
    name: agency-performance-dashboard
    runtime: node
    region: oregon
    plan: free

    # Install both frontend and API deps, then build the React app
    buildCommand: npm install --include=dev && npm run build && cd api && npm install

    # Serve everything from the Express server (which also serves dist/)
    startCommand: node api/server.js

    # Auto-deploy on pushes to main
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001

      # ── Auth ──────────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true          # Render generates a random value on first deploy

      # ── External-cron heartbeat ───────────────────────────────────────────────
      # Arms POST /api/cron/heartbeat. On the free plan the web service sleeps and
      # the in-process scheduler stops; point a Render Cron Job (or any external
      # scheduler) at /api/cron/heartbeat with `Authorization: Bearer <CRON_SECRET>`
      # to keep sync/watchdog/insights firing. UNSET = endpoint disabled (503, fails
      # closed). Generate a long random value and paste the SAME value into both this
      # web service and the Cron Job's env in the Render dashboard.
      #
      # ALSO arm the Memory OS autonomy: add a SECOND Render Cron Job (DAILY) at
      # /api/cron/memory (GET or POST, same `Authorization: Bearer <CRON_SECRET>`)
      # so memory governance (self-heal) + capture run even while the host sleeps.
      # On Vercel this is already automatic (vercel.json "crons"); Render needs this
      # one extra daily cron.
      - key: CRON_SECRET
        sync: false                  # Enter in Render dashboard — not stored in repo

      # ── AI narration (Anthropic) — OPTIONAL ───────────────────────────────────
      # UNSET = the AI layer degrades gracefully: the weekly recap / brief render
      # deterministic, evidence-grounded templates (HTTP 200) and POST /api/ai/ask
      # returns 503 (NO_AI). Set this to enable LLM narration — the numbers the model
      # is allowed to state are still produced by code (the evidence pack), never
      # invented. Enter in the Render dashboard; not stored in the repo.
      - key: ANTHROPIC_API_KEY
        sync: false
      # OPTIONAL cost cap — max paid AI calls/hour/caller (recap/brief/ask). Code
      # default is 60 when unset; override here only to tighten/loosen the budget.
      - key: AI_RATE_MAX
        sync: false

      # ── Optional: shared Google OAuth credentials ─────────────────────────────
      # Set once here; all Google connectors (Ads, GBP, GA4, LSA) will use these
      # so clients only need to provide their refresh_token, not client_id/secret.
      - key: GOOGLE_CLIENT_ID
        sync: false                  # Enter in Render dashboard — not stored in repo
      - key: GOOGLE_CLIENT_SECRET
        sync: false

      # ── PostgreSQL ────────────────────────────────────────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: performance-db
          property: connectionString

      # ── Email (Resend) ────────────────────────────────────────────────────────
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: noreply@youragency.com

      # ── App URL (used for unsubscribe links, OAuth redirects) ─────────────────
      - key: APP_URL
        value: https://agency-performance-dashboard.onrender.com
