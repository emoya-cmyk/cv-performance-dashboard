services:
  - type: web
    name: agency-performance-dashboard
    runtime: node
    region: oregon
    plan: free

    # Install both frontend and API deps, then build the React app
    buildCommand: npm install --include=dev && npm run build && cd api && npm install

    # Serve everything from the Express server (which also serves dist/)
    startCommand: node api/server.js

    # Auto-deploy on pushes to main
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001

      # ── Auth ──────────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true          # Render generates a random value on first deploy

      # ── External-cron heartbeat ───────────────────────────────────────────────
      # Arms POST /api/cron/heartbeat. On the free plan the web service sleeps and
      # the in-process scheduler stops; point a Render Cron Job (or any external
      # scheduler) at /api/cron/heartbeat with `Authorization: Bearer <CRON_SECRET>`
      # to keep sync/watchdog/insights firing. UNSET = endpoint disabled (503, fails
      # closed). Generate a long random value and paste the SAME value into both this
      # web service and the Cron Job's env in the Render dashboard.
      - key: CRON_SECRET
        sync: false                  # Enter in Render dashboard — not stored in repo

      # ── Optional: shared Google OAuth credentials ─────────────────────────────
      # Set once here; all Google connectors (Ads, GBP, GA4, LSA) will use these
      # so clients only need to provide their refresh_token, not client_id/secret.
      - key: GOOGLE_CLIENT_ID
        sync: false                  # Enter in Render dashboard — not stored in repo
      - key: GOOGLE_CLIENT_SECRET
        sync: false

      # ── PostgreSQL ────────────────────────────────────────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: performance-db
          property: connectionString

      # ── Email (Resend) ────────────────────────────────────────────────────────
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: noreply@youragency.com

      # ── App URL (used for unsubscribe links, OAuth redirects) ─────────────────
      - key: APP_URL
        value: https://agency-performance-dashboard.onrender.com
