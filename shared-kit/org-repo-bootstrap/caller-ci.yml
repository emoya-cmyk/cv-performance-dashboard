name: CI

# Drop-in replacement for the inlined .github/workflows/ci.yml in the three JS
# dashboards (cv-performance-dashboard, agency-performance-dashboard,
# performance-dashboard) — identical for all three. The whole CI becomes this one
# reference; the logic lives once in emoya-cmyk/.github/workflows/node-ci.yml.
#
# Preserves every gate the repos run inlined today: API tests (api/), eslint,
# Vitest (test:fe), and the Vite build. Do NOT activate until emoya-cmyk/.github
# exists with node-ci.yml published (see README.md).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    uses: emoya-cmyk/.github/.github/workflows/node-ci.yml@main
    with:
      node-version: '20'
      test-dir: 'api'
      test-command: 'node --test'
      build-dir: '.'
      lint-command: 'npm run lint'
      frontend-test-command: 'npm run test:fe'
      build-command: 'npx vite build'
